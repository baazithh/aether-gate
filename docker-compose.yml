version: '3.8'
services:
  # The "Data Lake" Storage
  catalog:
    image: tabulario/iceberg-rest
    ports:
      - "8181:8181"
    environment:
      - CATALOG_WAREHOUSE=s3a://warehouse/
      - CATALOG_IO_IMPL=org.apache.iceberg.aws.s3.S3FileIO

  # The Streaming Heart
  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092

  # The State Manager (For the "Pause/Intervene" logic)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # The Audit Database
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=aether_admin
      - POSTGRES_DB=aether_audit
    ports:
      - "5432:5432"